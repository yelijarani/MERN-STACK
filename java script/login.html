<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <h1>login form</h1>
            <label for="">username :</label>
            <input type="text" id="Username" placeholder="Username"><br><br>
             <label for="">password :</label>
           <input type="text" id="Password" placeholder="Password"><br><br>
           <button type="submit">Submit</button>
           <button type="reset">Cancel</button>
        </fieldset>
    </form>
    <script>
        let uName =document.getElementById("Username");
        let psw =document.getElementById("Password");
        let form =document.querySelector("form");

        form.addEventListener("submit",(e)=>{
            e.preventDefault()
            console.log("Username",uName.value);
            console.log("Password",psw.value);           
             window.localStorage.setItem("Username",uName.value)

            window.localStorage.setItem("Password",psw.value)


            let storedName=localStorage.getItem("Username")
            let storedPassword=localStorage.getItem("Password")
            console.log("stored username", storedName);
            console.log("stored password", storedpassword);
            

            
            

        })
        

        

    </script>
    
</body>
