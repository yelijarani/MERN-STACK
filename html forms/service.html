    <!DOCTYPE html>

</head>
<body>
    <h1 align="center" style="font-style:italic;"> service request form</h1>
    <form>
        <fieldset  width="500" height="600">
          <label for="customer name"> customer name:</label>
          <input type="text" placeholder="customer name" required="customer name" id="customer name"><br> <br>
          <label for="contact number"> contact number:</label>
          <input type="text" id="contact number" placeholder="contact number"><br> <br>
          <label for="issue type"> issue type:</label>
          <input type="dropdown" name="issue type" id="issue type">
          <select>
            <option value="billing"> billing</option>
            <option value="technical">technical</option>
            <option value="product">product</option>
          </select><br> <br>
          <label for="decription"> description:</label>
          <input type="textarea" id="decription" placeholder="description"><br> <br>
          <label for="priority">priority:</label>
          <input type="range" min="1" max="10" value="5">low
          <input type="range">high 
          <input type="range" min="1" max="1">medium<br> <br>
          <button type="button">
            submit
          </button> 
          </fieldset>
        </form> 
</body>
