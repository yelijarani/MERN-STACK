<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            background-image: linear-gradient(transparent,blue);
        
        }
        ol{
            padding: 20px;
            display: flex;
            justify-content: space-evenly;
            list-style: none;
        }
        li{
            background-color: black;
            color: aliceblue;
            padding: 10px 20px;
        }
        /*small devices designing*/
        @media screen and (max-width:450px){
            ol{
                flex-direction:column;
            }
            li{
                margin: 10px;
                text-align:center;
            }
            
        }
        /*ipads*/
        @media screen and (min-width:450px)and(max-width:850px) {
        nav{
            background-image: linear gradient(goldenrod, red);
        }   
       li{
        background-color:blue;
        color:black;
       }

    }
    </style>

</head>

<body>
    <nav>
        <ol>
            <li>Home</li>
            <li>About</li>
            <li>Help</li>
            <li>Contact</li>
            <li>LOGIN</li>
        </ol>
    </nav>
    
</body>
</html>
