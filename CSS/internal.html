     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inernal styling</title>
    <style>
        
        #heading {
            color: magenta;
            background-color: brown;
            text-align: center;
        }
        ol{
            background-color: blueviolet;
            padding: 20px;
        }
        li{
            background-color: black;
            padding: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1 id="heading"> Example for order list</h1>
    <ol id="heading">
        <li >Adress</li>
        <li>Team</li>
        <li>About</li>
        <li>Company</li>
        <li>Contact</li>
    </ol>
</body>
</html>
